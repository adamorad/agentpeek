name: CI
on:
  push: { branches: [v2, main] }
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -count=1
